name: Baseline API Load Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-load-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: tests/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Wait for Render API Service (Cold Start Handler)
        run: |
          echo "Checking status of live Render API at https://smart-press-backend.onrender.com/"
          TARGET_URL="https://smart-press-backend.onrender.com"
          
          # Poll the web service up to 30 times (interval: 5s, total timeout: 150s)
          # This handles Render's free tier spinning up time (cold start delay)
          for i in {1..30}; do
            status_code=$(curl -o /dev/null -s -w "%{http_code}" "$TARGET_URL/")
            if [ "$status_code" -eq 200 ] || [ "$status_code" -eq 301 ] || [ "$status_code" -eq 302 ]; then
              echo "SUCCESS: Render API is up and responsive! (HTTP Status: $status_code)"
              exit 0
            fi
            echo "HTTP Status: $status_code. API service is not ready. Retrying in 5 seconds... ($i/30)"
            sleep 5
          done
          
          echo "ERROR: Render API did not respond with 200/301/302 within 150 seconds."
          exit 1

      - name: Run Baseline Load Test
        run: |
          python tests/load_test.py
        env:
          LOAD_TEST_DURATION: 60

      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-load-test-report
          path: reports/Load_Test_Report.xlsx
          if-no-files-found: error
          retention-days: 30
