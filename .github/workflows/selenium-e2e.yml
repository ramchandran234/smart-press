name: Web E2E Testing with Selenium

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  selenium-e2e:
    name: Run Selenium E2E Web Tests
    runs-on: ubuntu-latest

    env:
      CI: true
      PORT: 5000
      MONGO_URI: ${{ secrets.MONGO_URI || 'mongodb+srv://Smartpress:S3F1tEy2lfcALMiV@cluster0.b5vrrjf.mongodb.net/smartpress?retryWrites=true&w=majority&appName=Cluster0' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'smartpress_super_secret_2026' }}
      NODE_ENV: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            smart_press_backend/package-lock.json
            smart_press_selenium/package-lock.json

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Web App Dependencies
        run: |
          cd smart_press
          flutter pub get

      - name: Build Flutter Web App
        run: |
          cd smart_press
          flutter build web

      - name: Install Backend Server Dependencies
        run: |
          cd smart_press_backend
          npm ci

      - name: Install Selenium Test Dependencies
        run: |
          cd smart_press_selenium
          npm ci

      - name: Run E2E Tests
        run: |
          cd smart_press_selenium
          npm test

      - name: Generate HTML Report
        if: always()
        run: |
          cd smart_press_selenium
          if [ -f "reports/E2E_Web_Test_Report.xlsx" ]; then
            if [ ! -d "node_modules" ]; then
              echo "node_modules directory is missing. Installing dependencies..."
              npm ci
            fi
            node convert-report.js reports/E2E_Web_Test_Report.xlsx reports/E2E_Web_Test_Report.html
          else
            echo "E2E_Web_Test_Report.xlsx not found. Skipping HTML report generation."
          fi

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-test-reports
          path: |
            smart_press_selenium/reports/E2E_Web_Test_Report.xlsx
            smart_press_selenium/reports/E2E_Web_Test_Report.html
          if-no-files-found: warn
          retention-days: 14
