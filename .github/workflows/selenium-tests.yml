name: Python Selenium E2E Web Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  run-selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: tests/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Wait for Render Web Service (Cold Start Handler)
        run: |
          echo "Checking status of live Render deployment at https://smart-press-website.onrender.com"
          TARGET_URL="https://smart-press-website.onrender.com"
          
          # Poll the web service up to 30 times (interval: 5s, total timeout: 150s)
          # This handles Render's free tier spinning up time (cold start delay)
          for i in {1..30}; do
            status_code=$(curl -o /dev/null -s -w "%{http_code}" "$TARGET_URL/")
            if [ "$status_code" -eq 200 ] || [ "$status_code" -eq 301 ] || [ "$status_code" -eq 302 ]; then
              echo "SUCCESS: Render service is up and responsive! (HTTP Status: $status_code)"
              exit 0
            fi
            echo "HTTP Status: $status_code. Web service is not ready. Retrying in 5 seconds... ($i/30)"
            sleep 5
          done
          
          echo "ERROR: Render deployment did not respond with 200/301/302 within 150 seconds."
          exit 1

      - name: Run E2E Selenium Tests
        run: |
          pytest tests/test_homepage.py --html=report.html --self-contained-html
        env:
          PYTHONPATH: .

      - name: Upload E2E Test Reports (HTML & Excel)
        uses: actions/upload-artifact@v4
        if: always()  # Upload reports even if test execution fails
        with:
          name: selenium-test-reports
          path: |
            report.html
            reports/E2E_Web_Test_Report.xlsx
          if-no-files-found: warn
          retention-days: 30
